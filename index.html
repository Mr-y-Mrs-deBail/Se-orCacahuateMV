<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/bob01.gif" type="image/gif">
    <title>MV</title>
</head>

<body>
    
   <div class="container mt-5 text-center">
        <img id="tituloDinamico" class="texto1" src="img/titulo4.png" alt="MV">
    </div>
    
    <div id="mvplayer" class="container mt-5">
        <div class="d-flex justify-content-center align-items-center" style="height: auto; width: 100%;">
            <iframe id="youtubeVideo" width="600" height="340" 
            src="https://drive.google.com/file/d/1FDFjpUcYcy0Lvf_vmV2x6HLxqF3dRlHy/preview" 
            title="Video player" frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
            </iframe>
        </div>
        
        <video id="videoPlayer" width="600" controls preload="metadata" style="display: none; margin: 0 auto;">
            <source id="videoSource" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    
    <div class="container mt-3">
        <div class="d-flex flex-column align-items-center">
            <button class="btn btnCap mb-3" type="button" data-toggle="collapse" data-target="#mvplaylist" aria-expanded="false" aria-controls="mvplaylist">
                
            </button>
            
            <div id="mvplaylist" class="collapse">
                <ul class="list-unstyled" id="playlist">
                    
                    <!-- <li class="bob-item active">
                        <a href="javascript:void(0)" onclick="changeVideo('1g9SqeM_f1o-LK-KFwYmS_Jf25uOh__DM', this, 'bob')">
                            <span class="anchor-icon">⚓</span> Bob Esponja                        
                        </a>
                    </li> -->
                    
                    <li class="pokemon-item active">
                        <a href="javascript:void(0)" onclick="changeVideo('1FDFjpUcYcy0Lvf_vmV2x6HLxqF3dRlHy', this, 'pokemon')">
                            <img class="pikachu" src="img/pikachu.gif" alt="MV"> Pokémon 1
                        </a>
                    </li>

                    <li class="ciudadano-item">
                        <a href="javascript:void(0)" onclick="changeVideo('1gWu3QWyAGzcckzCDIcGIGAlFGzjPDi8d', this, 'ciudadanoE')">
                          <img class="teddy" src="img/cine.gif" alt=""> Johnny English
                        </a>
                    </li>

                    <li class="tokio-item">
                        <a href="javascript:void(0)" onclick="changeVideo('1k5y54_wxLV4Y2Pr7o8o6gJ2_75rvlJYk', this, 'retokio')">
                          <img class="teddy" src="img/cine.gif" alt=""> Tokyo Drift
                        </a>
                    </li>

                    <li class="honor-item">
                        <a href="javascript:void(0)" onclick="changeVideo('1PE1nGzL-8B_RjK7M6dimKtPzqZQZ-e6m', this, 'honor')">
                          <img class="teddy" src="img/cine.gif" alt=""> Finch
                        </a>
                    </li>
                    
                    <li class="arcane-item">
                        <a href="javascript:void(0)" onclick="changeVideo('1QxQPTF1gfKjfAgsVWYrZbcwYQyVD2J4u', this, 'arcane')">
                            <img class="ico" src="img/1.png" alt="Arcane"> Cap 2
                        </a>
                    </li>

                    <li class="arcane-item">
                        <a href="javascript:void(0)" onclick="changeVideo('139zw1YcUD3xKi5iF3Hp6cfkGDhXRzTIw', this, 'arcane')">
                            <img class="ico" src="img/1.png" alt="Arcane"> Cap 3
                        </a>
                    </li>

                    <li class="arcane-item">
                        <a href="javascript:void(0)" onclick="changeVideo('1rLfpRUGe0-MaP0sMURzl8w8Ks9hKISwf', this, 'arcane')">
                            <img class="ico" src="img/1.png" alt="Arcane"> Cap 4
                        </a>
                    </li>

                    <!-- <li class="sakura-item">
                        <a href="javascript:void(0)" onclick="changeVideo('1g-yqIMH_H8wegkMkxsj38jkcyK5QUzx9', this, 'sakuraCC')">
                            <img class="ico" src="img/kero.png" alt="Sakura"> Cap 1
                        </a>
                    </li> -->

                    <!-- <li class="sakura-item">
                        <a href="javascript:void(0)" onclick="changeVideo('1pn8uHU-sE0LC3-AtXtgLL3EMECyyyCg2', this, 'sakuraCC')">
                            <img class="ico" src="img/kero.png" alt="Sakura"> Cap 2
                        </a>
                    </li> -->
                    
                </ul>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

  <script>
    function changeVideo(idOrUrl, element, tema) {
        const videoPlayer = document.getElementById('videoPlayer');
        const youtubeVideo = document.getElementById('youtubeVideo');
        const body = document.body;
        const titulo = document.getElementById('tituloDinamico');
        
        if (idOrUrl.length > 20) { 
            if (videoPlayer) {
                videoPlayer.pause();
                videoPlayer.style.display = 'none';
            }
            if (youtubeVideo) {
                youtubeVideo.style.display = 'block';
                youtubeVideo.src = `https://drive.google.com/file/d/${idOrUrl}/preview`;
            }
        }
        
        if (tema === 'pokemon') {
            body.classList.add('tema-pokemon');
            body.classList.remove('tema-bob', 'tema-ciudadano', 'tema-reto-tokio', 'tema-arcane', 'tema-honor','tema-sakura');
            if (titulo) {
                titulo.src = 'img/titulo4.png';
                titulo.style.display = 'inline-block';
            }
            
        } else if (tema === 'ciudadanoE') {
            body.classList.add('tema-ciudadano');
            body.classList.remove('tema-bob', 'tema-pokemon', 'tema-reto-tokio', 'tema-arcane', 'tema-honor', 'tema-sakura');
            if (titulo) {
                titulo.style.display = 'none';
            }
            
        } else if (tema === 'retokio') {
            body.classList.add('tema-reto-tokio');
            body.classList.remove('tema-bob', 'tema-pokemon', 'tema-ciudadano', 'tema-arcane', 'tema-honor', 'tema-sakura');
            if (titulo) { 
                titulo.style.display = 'none';
            } 

            } else if (tema === 'honor') {
    body.classList.add('tema-honor');
    body.classList.remove('tema-bob', 'tema-pokemon', 'tema-ciudadano', 'tema-reto-tokio', 'tema-arcane', 'tema-sakura');
    if (titulo) { 
        titulo.style.display = 'none';
    } 
} else if (tema === 'sakuraCC') {
    body.classList.add('tema-sakura');
    body.classList.remove('tema-bob', 'tema-pokemon', 'tema-ciudadano', 'tema-reto-tokio', 'tema-arcane');
    if (titulo) { 
        titulo.style.display = 'none';
    }
            
        } else if (tema === 'arcane') {
            body.classList.add('tema-arcane');
            body.classList.remove('tema-bob', 'tema-pokemon', 'tema-ciudadano', 'tema-reto-tokio', 'tema-honor', 'tema-sakura');
            if (titulo) {
                        titulo.style.display = 'none';
            }
            
        } 
        else {
            body.classList.add('tema-bob');
            body.classList.remove('tema-pokemon', 'tema-ciudadano', 'tema-reto-tokio', 'tema-arcane', 'tema-honor', 'tema-sakura');
            if (titulo) {
                titulo.src = 'img/titulo03.png';
                titulo.style.display = 'inline-block';
            }
        }
        
        const items = document.querySelectorAll('#playlist li');
        items.forEach(item => item.classList.remove('active'));
        
        if (element) {
            const parentLi = element.closest('li');
            if (parentLi) {
                parentLi.classList.add('active');
                parentLi.classList.add('visto');
                localStorage.setItem('visto_' + idOrUrl, 'true');
            }
        }
    }
    
    window.onload = function() {
        const links = document.querySelectorAll('#playlist a');
        links.forEach(link => {
            const onclickAttr = link.getAttribute('onclick');
            if (onclickAttr) {
                const match = onclickAttr.match(/'([^']+)'/);
                if (match) {
                    const id = match[1];
                    if (localStorage.getItem('visto_' + id) === 'true') {
                        const li = link.closest('li');
                        if (li) li.classList.add('visto');
                    }
                }
            }
        });
    };
</script>

</body>
</html>
